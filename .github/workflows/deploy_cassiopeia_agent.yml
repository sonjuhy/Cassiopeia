name: Deploy cassiopeia_agent

on:
  push:
    branches: [main]
    paths:
      - 'agents/cassiopeia_agent/**'
      - 'shared_core/**'
      - '.github/workflows/deploy_cassiopeia_agent.yml'

jobs:
  # ── 테스트 ──────────────────────────────────────────────────────────────────
  test:
    uses: ./.github/workflows/test.yml

  # ── 빌드 & 배포 (테스트 통과 후) ─────────────────────────────────────────────
  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./agents/cassiopeia_agent/Dockerfile.alpine
          push: true
          tags: ghcr.io/${{ github.repository }}-cassiopeia_agent:latest
          
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}-cassiopeia_agent:latest
            docker image prune -f
